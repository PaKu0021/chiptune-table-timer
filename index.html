<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Chiptune 桌位计时器</title>
<style>
:root{--bg:#f7f3ea;--card:#fffaf2;--main:#f2c94c;--main-dark:#d8a900;--text:#332d24;--muted:#8a8174;--line:#e6dccb;--danger:#e85d5d;--ok:#54a66b;--shadow:0 8px 24px rgba(80,60,30,.12)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text);padding:18px}
header{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px}
h1{margin:0;font-size:26px}.sub{color:var(--muted);font-size:13px;margin-top:4px}
button,select,input{font-size:16px;border-radius:12px;border:1px solid var(--line);padding:10px 12px;background:#fff}
button{cursor:pointer;font-weight:700}.btn-main{background:var(--main);border-color:var(--main-dark)}.btn-danger{background:var(--danger);border-color:var(--danger);color:#fff}.btn-ghost{background:#fff}
.top-buttons{display:flex;gap:8px;flex-wrap:wrap}.tables{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:var(--shadow)}
.card.overtime{background:#fff0f0;border-color:var(--danger)}
.table-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.table-name{font-size:22px;font-weight:800}
.status{font-size:13px;padding:5px 9px;border-radius:999px;background:#eee;color:var(--muted)}.status.running{background:#e9f7ed;color:var(--ok)}.status.overtime{background:var(--danger);color:#fff}
.timer{font-size:38px;font-weight:900;text-align:center;margin:14px 0 6px}.timer.overtime-text{color:var(--danger)}
.info{text-align:center;color:var(--muted);font-size:14px;min-height:22px;margin-bottom:12px}
.package-row{display:flex;gap:8px;margin-top:8px}.package-row select{flex:1;min-width:0}
.price{text-align:center;font-size:17px;font-weight:800;margin-top:10px;line-height:1.7}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.full{grid-column:1/-1}
dialog{width:min(820px,calc(100vw - 28px));border:none;border-radius:24px;padding:0;box-shadow:0 20px 80px rgba(0,0,0,.25);background:var(--card)}
dialog::backdrop{background:rgba(0,0,0,.35)}.modal{padding:20px}.modal h2{margin:0 0 12px}
.setting-block{border:1px solid var(--line);border-radius:16px;padding:12px;margin-bottom:12px;background:#fff}
.setting-grid{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px;align-items:end;margin-bottom:8px}.setting-grid input{width:100%}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap;margin-top:14px}
label{font-size:13px;color:var(--muted);display:block;margin-bottom:4px}.small{font-size:13px;color:var(--muted);line-height:1.5}
.checkout-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px}
@media(max-width:640px){body{padding:12px}header{align-items:flex-start;flex-direction:column}h1{font-size:22px}.timer{font-size:34px}.setting-grid,.checkout-row{grid-template-columns:1fr}}
</style>
</head>

<body>
<header>
  <div>
    <h1>Chiptune 桌位计时器</h1>
    <div class="sub" id="syncStatus">正在连接 Firebase...</div>
  </div>
  <div class="top-buttons">
    <button class="btn-ghost" onclick="openSettings()">设置</button>
    <button class="btn-ghost" onclick="exportRecords()">导出收银记录</button>
    <button class="btn-main" onclick="addTable()">＋ 添加桌位</button>
  </div>
</header>

<main class="tables" id="tables"></main>

<dialog id="settingsDialog">
  <div class="modal">
    <h2>设置</h2>

    <div class="setting-block">
      <label>桌位数量</label>
      <input class="safe-input" id="tableCountInput" type="number" min="1" max="50" readonly>
    </div>

    <div class="setting-block">
      <label>套餐设置</label>
      <div class="small">每个套餐可以单独设置续费时间和续费金额。</div>
      <div id="packageSettings"></div>
      <button class="btn-main" onclick="addPackageSetting()">＋ 添加套餐</button>
    </div>

    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeSettings()">取消</button>
      <button class="btn-main" onclick="saveSettings()">保存设置</button>
    </div>
  </div>
</dialog>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDRaQF1N4p9J3q1k0eBNdKzvnwvcAZwY6g",
  authDomain: "chiptune-table-timer.firebaseapp.com",
  projectId: "chiptune-table-timer",
  storageBucket: "chiptune-table-timer.firebasestorage.app",
  messagingSenderId: "524748960844",
  appId: "1:524748960844:web:958f11454796be7366f0e9",
  measurementId: "G-68TF8QWDT9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const stateRef = doc(db, "shop", "main");

const defaultPackages = [
  { name:"1小时", minutes:60, price:1500, extensionName:"续费1小时", extensionMinutes:60, extensionPrice:900 },
  { name:"2小时", minutes:120, price:2800, extensionName:"续费1小时", extensionMinutes:60, extensionPrice:900 },
  { name:"3小时", minutes:180, price:3300, extensionName:"续费1小时", extensionMinutes:60, extensionPrice:800 },
  { name:"6小时", minutes:360, price:5500, extensionName:"续费1小时", extensionMinutes:60, extensionPrice:800 },
  { name:"不限时", minutes:0, price:5500, extensionName:"续费", extensionMinutes:0, extensionPrice:0 }
];

let state = {
  packages: defaultPackages,
  records: [],
  tables: Array.from({length:12},(_,i)=>newTable(i+1))
};

function newTable(num){
  return {
    id: Date.now() + Math.random(),
    name: `${num}号桌`,
    packageIndex: 0,
    status: "idle",
    startTime: null,
    pausedTotalMs: 0,
    pauseStartTime: null,
    extensionsUsed: [],
    roundingUnit: 0,
    alerted: false
  };
}

function normalizeState(){
  if(!state.packages) state.packages = defaultPackages;
  if(!state.records) state.records = [];
  if(!state.tables) state.tables = Array.from({length:12},(_,i)=>newTable(i+1));

  state.packages.forEach(p=>{
    if(p.extensionName === undefined) p.extensionName = "续费1小时";
    if(p.extensionMinutes === undefined) p.extensionMinutes = 60;
    if(p.extensionPrice === undefined) p.extensionPrice = 800;
  });

  state.tables.forEach(t=>{
    if(!t.extensionsUsed) t.extensionsUsed = [];
    if(t.roundingUnit === undefined) t.roundingUnit = 0;
  });
}

async function saveCloud(){
  normalizeState();
  await setDoc(stateRef, state);
}

async function initCloud(){
  const snap = await getDoc(stateRef);
  if(!snap.exists()){
    await setDoc(stateRef, state);
  }

  onSnapshot(stateRef, snap=>{
    if(snap.exists()){
      state = snap.data();
      normalizeState();
      document.getElementById("syncStatus").textContent = "已连接，多设备实时同步中。";
      render();
    }
  }, err=>{
    document.getElementById("syncStatus").textContent = "Firebase 连接失败。";
    alert("Firebase 连接失败：" + err.message);
  });
}

function formatTime(ms){
  ms = Math.max(0, ms);
  const total = Math.floor(ms/1000);
  const h = Math.floor(total/3600);
  const m = Math.floor((total%3600)/60);
  const s = total%60;
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

function formatDate(ts){
  if(!ts) return "";
  const d = new Date(ts);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}

function getElapsedMs(t){
  if(!t.startTime) return 0;
  const end = t.status === "paused" ? t.pauseStartTime : Date.now();
  return Math.max(0, end - t.startTime - Number(t.pausedTotalMs || 0));
}

function getExtensionMinutes(t){
  return (t.extensionsUsed || []).reduce((sum,e)=>sum + Number(e.minutes || 0),0);
}

function getExtensionAmount(t){
  return (t.extensionsUsed || []).reduce((sum,e)=>sum + Number(e.price || 0),0);
}

function getLimitMs(t){
  const pkg = state.packages[t.packageIndex];
  if(!pkg || Number(pkg.minutes) === 0) return Infinity;
  return (Number(pkg.minutes) + getExtensionMinutes(t)) * 60 * 1000;
}

function getPackagePrice(t){
  const pkg = state.packages[t.packageIndex];
  return pkg ? Number(pkg.price || 0) : 0;
}

function getRawTotal(t){
  return getPackagePrice(t) + getExtensionAmount(t);
}

function getRoundedTotal(t){
  const raw = getRawTotal(t);
  const unit = Number(t.roundingUnit || 0);
  if(!unit) return raw;
  return Math.floor(raw / unit) * unit;
}

function getDiscountAmount(t){
  return getRawTotal(t) - getRoundedTotal(t);
}

function enableInputOnTap(root=document){
  root.querySelectorAll(".safe-input").forEach(input=>{
    input.setAttribute("readonly","readonly");
    input.addEventListener("pointerdown",()=>{
      input.removeAttribute("readonly");
    },{once:true});
  });
}

window.render = function(){
  const active = document.activeElement;
  if(active && active.tagName === "SELECT") return;

  const container = document.getElementById("tables");
  container.innerHTML = "";

  state.tables.forEach((t,index)=>{
    const pkg = state.packages[t.packageIndex] || state.packages[0];
    const elapsed = getElapsedMs(t);
    const remain = getLimitMs(t) - elapsed;
    const isUnlimited = pkg && Number(pkg.minutes) === 0;
    const isOvertime = t.status === "running" && !isUnlimited && remain <= 0;

    if(isOvertime && !t.alerted){
      t.alerted = true;
      saveCloud();
      playAlert();
      setTimeout(()=>alert(`${t.name} 已超时！`),50);
    }

    let timerText = "00:00:00";
    let info = "未开始";

    if(t.status === "running" || t.status === "paused"){
      if(isUnlimited){
        timerText = formatTime(elapsed);
        info = `已使用时间｜${pkg.name}`;
      }else if(remain >= 0){
        timerText = formatTime(remain);
        info = `剩余时间｜${pkg.name}`;
      }else{
        timerText = `超时 ${formatTime(Math.abs(remain))}`;
        info = `已使用 ${formatTime(elapsed)}｜${pkg.name}`;
      }
    }

    const statusText = t.status === "idle" ? "空闲" : isOvertime ? "已超时" : t.status === "paused" ? "暂停中" : "计时中";
    const statusClass = isOvertime ? "overtime" : t.status === "running" ? "running" : "";

    const extensionButton = Number(pkg.extensionMinutes || 0) > 0
      ? `<button class="btn-ghost full" onclick="addPackageExtension(${index})">${pkg.extensionName || "续费"}<br>+${pkg.extensionMinutes}分钟 / ¥${pkg.extensionPrice}</button>`
      : "";

    const card = document.createElement("div");
    card.className = `card ${isOvertime ? "overtime" : ""}`;
    card.innerHTML = `
      <div class="table-head">
        <div class="table-name">${t.name}</div>
        <div class="status ${statusClass}">${statusText}</div>
      </div>

      <div class="package-row">
        <select onchange="changePackage(${index}, this.value)" ${t.status !== "idle" ? "disabled" : ""}>
          ${state.packages.map((p,i)=>`
            <option value="${i}" ${i === t.packageIndex ? "selected" : ""}>
              ${p.name}｜${p.minutes == 0 ? "不限时" : p.minutes + "分钟"}｜¥${p.price}
            </option>
          `).join("")}
        </select>
      </div>

      <div class="timer ${isOvertime ? "overtime-text" : ""}">${timerText}</div>
      <div class="info">${info}</div>

      <div class="price">
        套餐金额：¥${getPackagePrice(t).toLocaleString()}<br>
        续费金额：¥${getExtensionAmount(t).toLocaleString()}<br>
        原金额：¥${getRawTotal(t).toLocaleString()}<br>
        抹零：-¥${getDiscountAmount(t).toLocaleString()}<br>
        实收金额：¥${getRoundedTotal(t).toLocaleString()}
      </div>

      <div class="controls">
        ${t.status === "idle" ? `<button class="btn-main full" onclick="startTable(${index})">开始计时</button>` : ""}
        ${t.status === "running" ? `<button class="btn-ghost" onclick="pauseTable(${index})">暂停</button>` : ""}
        ${t.status === "paused" ? `<button class="btn-main" onclick="resumeTable(${index})">继续</button>` : ""}

        ${t.status !== "idle" ? `
          ${extensionButton}
          <button class="btn-ghost" onclick="setRounding(${index},0)">不抹零</button>
          <button class="btn-ghost" onclick="setRounding(${index},10)">抹个位</button>
          <button class="btn-ghost" onclick="setRounding(${index},100)">抹十位</button>
          <button class="btn-ghost" onclick="setRounding(${index},1000)">抹百位</button>
          <button class="btn-ghost full" onclick="setRounding(${index},10000)">抹千位</button>
          <button class="btn-danger full" onclick="checkoutTable(${index})">结账/记录</button>
        ` : `<button class="btn-ghost full" onclick="renameTable(${index})">修改桌名</button>`}
      </div>
    `;
    container.appendChild(card);
  });
};

window.startTable = async function(index){
  const t = state.tables[index];
  t.status = "running";
  t.startTime = Date.now();
  t.pausedTotalMs = 0;
  t.pauseStartTime = null;
  t.extensionsUsed = [];
  t.roundingUnit = 0;
  t.alerted = false;
  await saveCloud();
};

window.pauseTable = async function(index){
  const t = state.tables[index];
  t.status = "paused";
  t.pauseStartTime = Date.now();
  await saveCloud();
};

window.resumeTable = async function(index){
  const t = state.tables[index];
  if(t.pauseStartTime){
    t.pausedTotalMs = Number(t.pausedTotalMs || 0) + Date.now() - t.pauseStartTime;
  }
  t.status = "running";
  t.pauseStartTime = null;
  await saveCloud();
};

window.addPackageExtension = async function(index){
  const t = state.tables[index];
  const pkg = state.packages[t.packageIndex];
  t.extensionsUsed.push({
    name: pkg.extensionName || "续费",
    minutes: Number(pkg.extensionMinutes || 0),
    price: Number(pkg.extensionPrice || 0),
    packageName: pkg.name,
    addedAt: Date.now()
  });
  t.alerted = false;
  await saveCloud();
};

window.setRounding = async function(index,unit){
  state.tables[index].roundingUnit = unit;
  await saveCloud();
};

window.checkoutTable = async function(index){
  const t = state.tables[index];
  const pkg = state.packages[t.packageIndex];

  const text =
`${t.name} 结账确认

套餐：${pkg.name}
套餐金额：¥${getPackagePrice(t).toLocaleString()}
续费时间：${getExtensionMinutes(t)}分钟
续费金额：¥${getExtensionAmount(t).toLocaleString()}
原金额：¥${getRawTotal(t).toLocaleString()}
抹零：-¥${getDiscountAmount(t).toLocaleString()}
实收：¥${getRoundedTotal(t).toLocaleString()}

确定保存收银记录并重置吗？`;

  if(!confirm(text)) return;

  state.records.push({
    date: formatDate(Date.now()),
    tableName: t.name,
    startTime: formatDate(t.startTime),
    checkoutTime: formatDate(Date.now()),
    packageName: pkg.name,
    packageMinutes: pkg.minutes == 0 ? "不限时" : pkg.minutes,
    packagePrice: getPackagePrice(t),
    extensionMinutes: getExtensionMinutes(t),
    extensionAmount: getExtensionAmount(t),
    extensionDetail: t.extensionsUsed.map(e=>`${e.name}/${e.minutes}分钟/¥${e.price}`).join("；"),
    rawAmount: getRawTotal(t),
    roundingUnit: t.roundingUnit || 0,
    discountAmount: getDiscountAmount(t),
    totalAmount: getRoundedTotal(t)
  });

  state.tables[index] = {
    ...t,
    status:"idle",
    startTime:null,
    pausedTotalMs:0,
    pauseStartTime:null,
    extensionsUsed:[],
    roundingUnit:0,
    alerted:false
  };

  await saveCloud();
};

window.changePackage = async function(index, packageIndex){
  state.tables[index].packageIndex = Number(packageIndex);
  state.tables[index].roundingUnit = 0;
  await saveCloud();
};

window.renameTable = async function(index){
  const name = prompt("请输入桌位名称", state.tables[index].name);
  if(!name) return;
  state.tables[index].name = name.trim();
  await saveCloud();
};

window.addTable = async function(){
  state.tables.push(newTable(state.tables.length + 1));
  await saveCloud();
};

window.openSettings = function(){
  document.getElementById("tableCountInput").value = state.tables.length;
  renderPackageSettings();
  document.getElementById("settingsDialog").showModal();
  enableInputOnTap(document.getElementById("settingsDialog"));
};

window.closeSettings = function(){
  document.getElementById("settingsDialog").close();
};

function renderPackageSettings(){
  const box = document.getElementById("packageSettings");
  box.innerHTML = "";

  state.packages.forEach((pkg,index)=>{
    const row = document.createElement("div");
    row.className = "setting-block";
    row.innerHTML = `
      <div class="setting-grid">
        <div><label>套餐名</label><input class="safe-input" value="${pkg.name}" data-pkg-name="${index}" readonly></div>
        <div><label>套餐时长分钟，0=不限时</label><input class="safe-input" type="number" min="0" value="${pkg.minutes}" data-pkg-minutes="${index}" readonly></div>
        <div><label>套餐金额</label><input class="safe-input" type="number" min="0" value="${pkg.price}" data-pkg-price="${index}" readonly></div>
        <button class="btn-danger" onclick="removePackageSetting(${index})">删除</button>
      </div>

      <div class="setting-grid">
        <div><label>续费按钮名称</label><input class="safe-input" value="${pkg.extensionName || "续费1小时"}" data-ext-name="${index}" readonly></div>
        <div><label>续费时间分钟</label><input class="safe-input" type="number" min="0" value="${pkg.extensionMinutes || 0}" data-ext-minutes="${index}" readonly></div>
        <div><label>续费金额</label><input class="safe-input" type="number" min="0" value="${pkg.extensionPrice || 0}" data-ext-price="${index}" readonly></div>
        <div></div>
      </div>
    `;
    box.appendChild(row);
  });

  enableInputOnTap(box);
}

window.addPackageSetting = function(){
  state.packages.push({
    name:"新套餐",
    minutes:60,
    price:0,
    extensionName:"续费1小时",
    extensionMinutes:60,
    extensionPrice:800
  });
  renderPackageSettings();
};

window.removePackageSetting = function(index){
  if(state.packages.length <= 1){
    alert("至少保留一个套餐。");
    return;
  }
  state.packages.splice(index,1);
  state.tables.forEach(t=>{
    if(t.packageIndex >= state.packages.length) t.packageIndex = 0;
  });
  renderPackageSettings();
};

window.saveSettings = async function(){
  state.packages = state.packages.map((pkg,index)=>({
    name: document.querySelector(`[data-pkg-name="${index}"]`).value || "未命名套餐",
    minutes: Number(document.querySelector(`[data-pkg-minutes="${index}"]`).value || 0),
    price: Number(document.querySelector(`[data-pkg-price="${index}"]`).value || 0),
    extensionName: document.querySelector(`[data-ext-name="${index}"]`).value || "续费",
    extensionMinutes: Number(document.querySelector(`[data-ext-minutes="${index}"]`).value || 0),
    extensionPrice: Number(document.querySelector(`[data-ext-price="${index}"]`).value || 0)
  }));

  const count = Number(document.getElementById("tableCountInput").value || state.tables.length);

  if(count > state.tables.length){
    for(let i=state.tables.length;i<count;i++) state.tables.push(newTable(i+1));
  }else if(count < state.tables.length){
    const running = state.tables.slice(count).some(t=>t.status !== "idle");
    if(running && !confirm("被删除的桌位中有正在计时的桌位，确定删除吗？")) return;
    state.tables = state.tables.slice(0,count);
  }

  document.getElementById("settingsDialog").close();
  await saveCloud();
};

window.exportRecords = function(){
  if(!state.records.length){
    alert("目前还没有收银记录。");
    return;
  }

  const headers = [
    "结账日期","桌位","开始时间","结账时间",
    "套餐名称","套餐时间","套餐金额",
    "续费时间","续费金额","续费明细",
    "原金额","抹零单位","抹零金额","实收金额"
  ];

  const rows = state.records.map(r=>[
    r.date,r.tableName,r.startTime,r.checkoutTime,
    r.packageName,r.packageMinutes,r.packagePrice,
    r.extensionMinutes,r.extensionAmount,r.extensionDetail,
    r.rawAmount ?? r.totalAmount,
    r.roundingUnit || 0,
    r.discountAmount || 0,
    r.totalAmount
  ]);

  const csv = [headers,...rows]
    .map(row=>row.map(cell=>`"${String(cell ?? "").replace(/"/g,'""')}"`).join(","))
    .join("\n");

  const blob = new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `chiptune_cash_records_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
};

function playAlert(){
  try{
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    oscillator.type = "sine";
    oscillator.frequency.setValueAtTime(880,audioCtx.currentTime);
    gainNode.gain.setValueAtTime(.2,audioCtx.currentTime);
    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    oscillator.start();
    setTimeout(()=>{oscillator.stop();audioCtx.close();},700);
  }catch(e){}
}

setInterval(()=>render(),1000);
initCloud();
</script>
</body>
</html>
