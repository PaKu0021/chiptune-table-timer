<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chiptune 桌位计时器</title>

<style>
body{font-family:-apple-system;background:#f7f3ea;margin:0;padding:15px}
.card{background:#fff;border-radius:16px;padding:12px;margin:10px;width:260px;display:inline-block}
.timer{font-size:26px;text-align:center}
button{padding:8px;border:none;border-radius:10px;margin-top:5px}
.main{background:#f2c94c}
.danger{background:#e85d5d;color:#fff}
</style>
</head>

<body>

<div id="login">
  <h2>输入密码</h2>
  <input id="pw" type="password">
  <button onclick="login()">进入</button>
</div>

<div id="app" style="display:none">
  <h2>桌位计时器</h2>
  <button onclick="showOwner()">老板模式</button>
  <div id="tables"></div>
</div>

<div id="owner" style="display:none">
  <h2>老板模式</h2>
  <button onclick="showApp()">返回</button>
  <button onclick="exportCSV()">导出全部CSV</button>
  <button onclick="exportDaily()">导出日报CSV</button>
  <div id="income"></div>
  <div id="daily"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDRaQF1N4p9J3q1k0eBNdKzvnwvcAZwY6g",
  authDomain: "chiptune-table-timer.firebaseapp.com",
  projectId: "chiptune-table-timer",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const PASSWORD="123456";
const RATE = 0.044;

let state={
  packages:[
    {name:"3小时",minutes:180,price:3300,extensionPrice:900},
    {name:"6小时",minutes:360,price:5500,extensionPrice:800}
  ],
  tables:Array.from({length:6},(_,i)=>({
    name:(i+1)+"号桌",
    start:null,
    pkg:0,
    extra:0,
    pay:"",
    currency:"日元"
  })),
  records:[]
};

const ref=doc(db,"shop","main");

onSnapshot(ref,s=>{
  if(s.exists()){
    state=s.data();
    render();
  }else{
    save();
  }
});

function save(){setDoc(ref,state)}

function login(){
  if(document.getElementById("pw").value!==PASSWORD)return alert("密码错误");
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
}

function format(ms){
  let s=Math.floor(ms/1000);
  let m=Math.floor(s/60);
  let h=Math.floor(m/60);
  return `${h}:${m%60}:${s%60}`;
}

function render(){
  let box=document.getElementById("tables");
  box.innerHTML="";

  state.tables.forEach((t,i)=>{
    let pkg=state.packages[t.pkg];
    let elapsed=t.start?Date.now()-t.start:0;
    let limit=pkg.minutes*60000+t.extra*60000;
    let remain=limit-elapsed;

    let text=t.start?(remain>0?format(remain):"超时 "+format(-remain)):"未开始";

    let totalJPY = pkg.price + (t.extra/60)*pkg.extensionPrice;
    let totalRMB = Math.floor(totalJPY * RATE);

    let card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
    <h3>${t.name}</h3>

    <select onchange="changePkg(${i},this.value)">
      ${state.packages.map((p,idx)=>`
      <option value="${idx}" ${idx==t.pkg?"selected":""}>
      ${p.name} ¥${p.price}
      </option>`).join("")}
    </select>

    <div class="timer">${text}</div>

    <div>
      日元：¥${totalJPY}<br>
      人民币：¥${totalRMB}
    </div>

    <select onchange="setPay(${i},this.value)">
      <option value="">付款方式</option>
      <option>现金</option>
      <option>PayPay</option>
      <option>微信</option>
      <option>支付宝</option>
    </select>

    <select onchange="setCurrency(${i},this.value)">
      <option>日元</option>
      <option>人民币</option>
    </select>

    ${t.start?
      `<button onclick="addHour(${i})">+1h ¥${pkg.extensionPrice}</button>
       <button class="danger" onclick="checkout(${i})">结账</button>`
      :
      `<button class="main" onclick="start(${i})">开始</button>`
    }
    `;

    box.appendChild(card);
  });
}

function start(i){state.tables[i].start=Date.now();save();}
function changePkg(i,v){state.tables[i].pkg=Number(v);save();}
function addHour(i){state.tables[i].extra+=60;save();}
function setPay(i,v){state.tables[i].pay=v;save();}
function setCurrency(i,v){state.tables[i].currency=v;save();}

function checkout(i){
  let t=state.tables[i];
  let pkg=state.packages[t.pkg];

  let totalJPY = pkg.price + (t.extra/60)*pkg.extensionPrice;
  let totalRMB = Math.floor(totalJPY * RATE);

  state.records.push({
    table:t.name,
    totalJPY,
    totalRMB,
    pay:t.pay,
    currency:t.currency,
    time:new Date().toLocaleString()
  });

  state.tables[i]={...t,start:null,extra:0};
  save();
}

function showOwner(){
  document.getElementById("app").style.display="none";
  document.getElementById("owner").style.display="block";

  let today=new Date().toLocaleDateString();

  let todayRecords=state.records.filter(r=>r.time.startsWith(today));

  let jpy=0,rmb=0,count=0;
  let payStats={};

  todayRecords.forEach(r=>{
    if(r.currency==="日元") jpy+=r.totalJPY;
    else rmb+=r.totalRMB;

    payStats[r.pay]=(payStats[r.pay]||0)+1;
    count++;
  });

  document.getElementById("income").innerText=
    `今日收入\n日元: ¥${jpy}\n人民币: ¥${rmb}\n笔数:${count}`;

  document.getElementById("daily").innerText=
    "渠道统计:\n"+JSON.stringify(payStats,null,2);
}

function showApp(){
  document.getElementById("owner").style.display="none";
  document.getElementById("app").style.display="block";
}

function exportCSV(){
  let rows=[["桌位","日元","人民币","支付","币种","时间"]];
  state.records.forEach(r=>{
    rows.push([r.table,r.totalJPY,r.totalRMB,r.pay,r.currency,r.time]);
  });
  download(rows,"records.csv");
}

function exportDaily(){
  let today=new Date().toLocaleDateString();
  let rows=[["桌位","日元","人民币","支付","币种","时间"]];
  state.records.filter(r=>r.time.startsWith(today)).forEach(r=>{
    rows.push([r.table,r.totalJPY,r.totalRMB,r.pay,r.currency,r.time]);
  });
  download(rows,"daily.csv");
}

function download(rows,name){
  let csv=rows.map(r=>r.join(",")).join("\n");
  let blob=new Blob([csv]);
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=name;
  a.click();
}

setInterval(render,1000);

window.login=login;
window.start=start;
window.checkout=checkout;
window.addHour=addHour;
window.changePkg=changePkg;
window.setPay=setPay;
window.setCurrency=setCurrency;
window.showOwner=showOwner;
window.showApp=showApp;
window.exportCSV=exportCSV;
window.exportDaily=exportDaily;

</script>
</body>
</html>
